<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Eagle — learn English with short videos, matched to your level. Swipe, watch, learn.">
  <meta name="theme-color" content="#120F26">

  <!-- iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Eagle">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Social -->
  <meta property="og:title" content="Eagle — Learn English with Short Videos">
  <meta property="og:description" content="Swipe through bite-sized videos matched to your English level.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="icons/Icon-512.png">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Eagle</title>
  <link rel="manifest" href="manifest.json">

  <style>
    @font-face {
      font-family: 'Fraunces';
      src: url('assets/fonts/Fraunces-VariableFont_SOFT,WONK,opsz,wght.ttf') format('truetype');
      font-weight: 100 900;
      font-display: block;
    }

    html, body {
      margin: 0;
      height: 100%;
      background: #120F26;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #120F26;
    }

    #loading span {
      font-family: 'Fraunces', serif;
      font-size: 28px;
      font-weight: 600;
      color: #F6F4FF;
      letter-spacing: -0.5px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }
  </style>
</head>
<body>
  <div id="loading"><span>Eagle</span></div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      document.getElementById('loading').remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
